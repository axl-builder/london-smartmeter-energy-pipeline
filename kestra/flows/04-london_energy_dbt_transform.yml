id: london_energy_dbt_transform
namespace: company.team

tasks:
  - id: run_dbt_pipeline
    type: io.kestra.plugin.scripts.bash.Commands
    runner: PROCESS
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp_key.json
    beforeCommands:
      - pip install dbt-bigquery --quiet
    commands:
      # 1. Clonar tu repositorio fresco desde la nube (REEMPLAZAR URL)
      - echo "📥 Descargando planos desde GitHub..."
      - rm -rf /tmp/repo  # <-- EL ESCUDO SENIOR 
      - git clone https://github.com/axl-builder/london-smartmeter-energy-pipeline.git /tmp/repo
      
      # 2. Movernos a la carpeta de dbt
      - cd /tmp/repo/london_energy_dbt
      
      # 3. Fabricar el profiles.yml dinámico para este contenedor
      - echo "⚙️ Configurando credenciales de Google Cloud..."
      - mkdir -p ~/.dbt
      - |
        cat <<EOF > ~/.dbt/profiles.yml
        london_energy_dbt:
          target: dev
          outputs:
            dev:
              type: bigquery
              method: service-account
              project: smart-meters-london # REEMPLAZAR CON TU ID
              dataset: stg_london_energy
              threads: 4
              keyfile: /app/gcp_key.json
              location: US
        EOF
      
      # 4. Ejecutar la magia de dbt
      - echo "🚀 Iniciando Transformación y Testing en BigQuery..."
      # Usamos 'dbt build' que es un comando Senior: hace 'run' y 'test' al mismo tiempo
      - dbt build