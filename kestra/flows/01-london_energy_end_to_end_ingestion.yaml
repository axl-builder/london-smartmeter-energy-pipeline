id: london_energy_end_to_end_ingestion
namespace: company.team

tasks:
  # ---------------------------------------------------------
  # PHASE 1: IDEMPOTENT DOWNLOAD FROM KAGGLE
  # ---------------------------------------------------------
  - id: kaggle_download_idempotent
    type: io.kestra.plugin.scripts.python.Script
    runner: PROCESS
    env:
      # KAGGLE CREDENTIALS (Keep your current values)
      KAGGLE_USERNAME: "tu_usuario_de_kaggle"
      KAGGLE_KEY: "tu_llave_secreta_alfanumerica_de_kaggle"
    beforeCommands:
      - pip install kaggle --quiet
    script: |
      import os
      from kaggle.api.kaggle_api_extended import KaggleApi

      DATA_DIR = "/app/datasets"
      DATASET_ID = "jeanmidev/smart-meters-in-london"
      
      INDICATOR_FILE = os.path.join(DATA_DIR, "informations_households.csv")

      print(f"🔍 Checking local storage at {DATA_DIR}...")

      if os.path.exists(INDICATOR_FILE):
          print(f"✅ Data detected in local storage. Skipping Kaggle download.")
      else:
          print(f"⏳ Data missing. Starting download from {DATASET_ID} via Kaggle...")
          try:
              # Usamos la API oficial de Python en lugar de comandos de terminal
              api = KaggleApi()
              api.authenticate() # Automatically reads environment variables
              
              # Download and unzip directly into the directory
              api.dataset_download_files(DATASET_ID, path=DATA_DIR, unzip=True)
              print("✅ Download and extraction completed successfully.")
          except Exception as e:
              print(f"❌ Kaggle API Error: {e}")
              exit(1)

  # ---------------------------------------------------------
  # # PHASE 1.5: QUALITY INSPECTION (Custom Script)
  # ---------------------------------------------------------
  - id: run_quality_check
    type: io.kestra.plugin.scripts.python.Script
    runner: PROCESS
    beforeCommands:
      - pip install pandas --quiet
    script: |
      import subprocess
      print("🕵️‍♂️ Running external quality script...")
      subprocess.run(["python", "/app/research/quality_check.py"], check=True)

  # ---------------------------------------------------------
  # PHASE 2: IDEMPOTENT UPLOAD TO GOOGLE CLOUD STORAGE
  # ---------------------------------------------------------
  - id: gcs_upload_idempotent
    type: io.kestra.plugin.scripts.python.Script
    runner: PROCESS
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp_key.json
    beforeCommands:
      - pip install google-cloud-storage --quiet
    script: |
      import os
      from google.cloud import storage

      # REPLACE WITH YOUR BUCKET NAME
      BUCKET_NAME = "london_energy_datalake_smart-meters-london"
      BASE_DIR = "/app/datasets"

      client = storage.Client()
      bucket = client.bucket(BUCKET_NAME)

      print(f"🏗️ Starting upload to: gs://{BUCKET_NAME}")
      uploaded_count = 0
      skipped_count = 0

      for root, dirs, files in os.walk(BASE_DIR):
          for file in files:
              if file.endswith(".csv"):
                  local_path = os.path.join(root, file)
                  
                  blob_name = os.path.relpath(local_path, BASE_DIR).replace("\\", "/")
                  blob = bucket.blob(blob_name)
                  
                  if not blob.exists():
                      print(f"Uploading: {blob_name}...")
                      blob.upload_from_filename(local_path)
                      uploaded_count += 1
                  else:
                      skipped_count += 1

      print("="*40)
      print(f"✅ Ingestion Phase Completed.")
      print(f"📦 New files uploaded today: {uploaded_count}")
      print(f"⏭️ Files skipped (already in cloud): {skipped_count}")
      print("="*40)