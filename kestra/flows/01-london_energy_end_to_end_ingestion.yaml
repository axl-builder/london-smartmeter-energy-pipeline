id: london_energy_end_to_end_ingestion
namespace: company.team

tasks:
  # ---------------------------------------------------------
  # FASE 1: DESCARGA IDEMPOTENTE DESDE KAGGLE (Vía API Nativa)
  # ---------------------------------------------------------
  - id: kaggle_download_idempotent
    type: io.kestra.plugin.scripts.python.Script
    runner: PROCESS
    env:
      # TUS DATOS DE KAGGLE (Dejalos como los tenés)
      KAGGLE_USERNAME: "tu_usuario_de_kaggle"
      KAGGLE_KEY: "tu_llave_secreta_alfanumerica_de_kaggle"
    beforeCommands:
      - pip install kaggle --quiet
    script: |
      import os
      from kaggle.api.kaggle_api_extended import KaggleApi

      DATA_DIR = "/app/datasets"
      DATASET_ID = "jeanmidev/smart-meters-in-london"
      
      INDICATOR_FILE = os.path.join(DATA_DIR, "informations_households.csv")

      print(f"🔍 Verificando acopio local en {DATA_DIR}...")

      if os.path.exists(INDICATOR_FILE):
          print(f"✅ Materiales detectados en obra local. Saltando descarga de Kaggle.")
      else:
          print(f"⏳ Faltan materiales. Iniciando descarga de {DATASET_ID} desde Kaggle...")
          try:
              # Usamos la API oficial de Python en lugar de comandos de terminal
              api = KaggleApi()
              api.authenticate() # Lee tus variables de entorno automáticamente
              
              # Descarga y descomprime directo en la carpeta
              api.dataset_download_files(DATASET_ID, path=DATA_DIR, unzip=True)
              print("✅ Descarga y desembalaje completados con éxito.")
          except Exception as e:
              print(f"❌ Error en la grúa de Kaggle: {e}")
              exit(1)

  # ---------------------------------------------------------
  # FASE 1.5: INSPECCIÓN DE CALIDAD (Tu Script)
  # ---------------------------------------------------------
  - id: run_quality_check
    type: io.kestra.plugin.scripts.python.Script
    runner: PROCESS
    beforeCommands:
      - pip install pandas --quiet
    script: |
      import subprocess
      print("🕵️‍♂️ Ejecutando script de calidad externo...")
      subprocess.run(["python", "/app/research/quality_check.py"], check=True)

  # ---------------------------------------------------------
  # FASE 2: SUBIDA IDEMPOTENTE A GOOGLE CLOUD STORAGE
  # ---------------------------------------------------------
  - id: gcs_upload_idempotent
    type: io.kestra.plugin.scripts.python.Script
    runner: PROCESS
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp_key.json
    beforeCommands:
      - pip install google-cloud-storage --quiet
    script: |
      import os
      from google.cloud import storage

      # REEMPLAZÁ CON EL NOMBRE DE TU BUCKET
      BUCKET_NAME = "london_energy_datalake_smart-meters-london"
      BASE_DIR = "/app/datasets"

      client = storage.Client()
      bucket = client.bucket(BUCKET_NAME)

      print(f"🏗️ Iniciando carga hacia: gs://{BUCKET_NAME}")
      uploaded_count = 0
      skipped_count = 0

      for root, dirs, files in os.walk(BASE_DIR):
          for file in files:
              if file.endswith(".csv"):
                  local_path = os.path.join(root, file)
                  
                  blob_name = os.path.relpath(local_path, BASE_DIR).replace("\\", "/")
                  blob = bucket.blob(blob_name)
                  
                  if not blob.exists():
                      print(f"Subiendo: {blob_name}...")
                      blob.upload_from_filename(local_path)
                      uploaded_count += 1
                  else:
                      skipped_count += 1

      print("="*40)
      print(f"✅ Fase de Ingesta Finalizada.")
      print(f"📦 Archivos nuevos subidos hoy: {uploaded_count}")
      print(f"⏭️ Archivos omitidos (ya en la nube): {skipped_count}")
      print("="*40)