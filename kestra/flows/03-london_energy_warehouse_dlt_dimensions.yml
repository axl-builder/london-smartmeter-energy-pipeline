id: london_energy_dbt_transform
namespace: company.team

tasks:
  - id: run_dbt_pipeline
    type: io.kestra.plugin.scripts.bash.Commands
    runner: PROCESS
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp_key.json
    beforeCommands:
      - pip install dbt-bigquery --quiet
    commands:
      # 1. Clone fresh repository from the cloud (REPLACE URL)
      - echo "📥 Downloading blueprints from GitHub..."
      - git clone https://github.com/TU_USUARIO/TU_REPOSITORIO.git /tmp/repo
      
      # 2. Move to dbt directory
      - cd /tmp/repo/london_energy_dbt
      
      # 3. Generate dynamic profiles.yml for this container
      - echo "⚙️ Configuring Google Cloud credentials..."
      - mkdir -p ~/.dbt
      - |
        cat <<EOF > ~/.dbt/profiles.yml
        london_energy_dbt:
          target: dev
          outputs:
            dev:
              type: bigquery
              method: service-account
              project: TU_PROJECT_ID # REPLACE WITH YOUR ID
              dataset: stg_london_energy
              threads: 4
              keyfile: /app/gcp_key.json
              location: US
        EOF
      
      # 4. Execute dbt magic
      - echo "🚀 Starting Transformation and Testing in BigQuery..."
      # Using 'dbt build' (Senior level): performs 'run' and 'test' simultaneously
      - dbt build