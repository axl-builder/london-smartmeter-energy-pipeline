id: london_energy_master_pipeline
namespace: company.team
description: "End-to-End Pipeline: Kaggle Ingestion -> GCS -> External Tables/dlt -> dbt"

tasks:
  # ---------------------------------------------------------
  # STEP 1: Kaggle Download and GCS Upload
  # ---------------------------------------------------------
  - id: run_ingestion
    type: io.kestra.core.tasks.flows.Flow
    namespace: company.team
    flowId: london_energy_end_to_end_ingestion
    wait: true # Wait for completion before proceeding
    transmitFailed: true # Abort Master Flow on failure

  # ---------------------------------------------------------
  # STEP 2: Create BigQuery External Tables
  # ---------------------------------------------------------
  - id: run_external_tables
    type: io.kestra.core.tasks.flows.Flow
    namespace: company.team
    flowId: london_energy_warehouse_external_tables
    wait: true
    transmitFailed: true

  # ---------------------------------------------------------
  # STEP 3: Load Dimensions with dlt
  # ---------------------------------------------------------
  - id: run_dlt_dimensions
    type: io.kestra.core.tasks.flows.Flow
    namespace: company.team
    flowId: london_energy_warehouse_dlt_dimensions # (Adjust ID if a different name was used)
    wait: true
    transmitFailed: true

  # ---------------------------------------------------------
  # STEP 4: dbt Transformation (Staging & Prod)
  # ---------------------------------------------------------
  - id: run_dbt
    type: io.kestra.core.tasks.flows.Flow
    namespace: company.team
    flowId: london_energy_dbt_transform
    wait: true
    transmitFailed: true