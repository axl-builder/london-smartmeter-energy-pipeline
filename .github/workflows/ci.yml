name: CI Pipeline (Terraform & dbt)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 🏗️ TRABAJO 1: REVISAR TERRAFORM
  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check

  # 📊 TRABAJO 2: REVISAR DBT
  dbt-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery==1.11.1

      - name: Check dbt syntax
        run: |
          cd london_energy_dbt
          dbt deps
          dbt parse